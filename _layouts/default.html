<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>{% if page.heading %}{{ page.heading }}{% else %}{{ site.title }}{% endif %}</h1>
      <p>{% if page.tagline %}{{ page.tagline }}{% else %}{{ site.description }}{% endif %}</p>
      {% include nav.html %}
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; 2026</p>
  </footer>

  <script src="{{ "/assets/js/lightbox.js" | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
